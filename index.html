<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">

<style>

body{
background:white;
font-family:serif;
padding:60px;
line-height:1.7;
font-size:18px;
}

#text{
max-width:800px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div id="text"></div>

<script>

// -------- TESTO --------

let originalText = `Socrate – Ho sentito narrare che a Naucrati d’Egitto dimorava uno dei vecchi dèi del
paese, il dio a cui è sacro l’uccello chiamato ibis, e di nome detto Theuth. Egli fu
l’inventore dei numeri, [d] del calcolo, della geometria e dell’astronomia, per non parlare
del gioco del tavoliere e dei dadi e finalmente delle lettere dell’alfabeto. Re dell’intiero
paese era a quel tempo Thamus, che abitava nella grande città dell’Alto Egitto che i Greci
chiamano Tebe egiziana e il cui dio è Ammone. Theuth venne presso il re, gli rivelò le sue
arti dicendo che esse dovevano esser diffuse presso tutti gli Egiziani. Il re di ciascuna gli
chiedeva quale utilità comportasse, e poiché Theuth spiegava, egli disapprovava ciò che
gli sembrava [e] negativo, lodava ciò che gli pareva dicesse bene. Su ciascuna arte, dice
la storia, Thamus aveva molti argomenti da dire a Theuth sia contro che a favore, ma
sarebbe troppo lungo esporli. Quando giunsero all’alfabeto: “Questa scienza, o re – disse
Theuth – renderà gli Egiziani piú sapienti e arricchirà la loro memoria perché questa
scoperta è una medicina per la sapienza e la memoria”. E il re rispose: “O ingegnosissimo
Theuth, una cosa è la potenza creatrice di arti nuove, altra cosa è giudicare qual grado di
danno e di utilità esse posseggano per coloro che le useranno. E cosí ora tu, per
benevolenza verso l’alfabeto di cui sei inventore, hai esposto il contrario del suo vero
effetto. Perché esso ingenererà oblio nelle anime di chi lo imparerà: essi cesseranno di
esercitarsi la memoria perché fidandosi dello scritto richiameranno le cose alla mente non
piú dall’interno di se stessi, ma dal di fuori, attraverso segni estranei: ciò che tu hai trovato
non è una ricetta per la memoria ma per richiamare alla mente. Né tu offri vera sapienza ai
tuoi scolari, ma ne dai solo l’apparenza perché essi, grazie a te, potendo avere notizie di
molte cose senza insegnamento, si crederanno d’essere dottissimi, mentre per la maggior
parte non sapranno nulla; con loro sarà una sofferenza discorrere, imbottiti di opinioni
invece che sapienti”.
Fedro – O Socrate, ti è facile inventare racconti egiziani e di qualunque altro paese ti
piaccia!
Socrate – Oh! ma i sacerdoti del tempio di Zeus a Dodona, mio caro, dicevano che le
prime rivelazioni profetiche erano uscite da una quercia. Alla gente di quei giorni, che non
era sapiente come voi giovani, bastava nella loro ingenuità udire ciò che diceva “la quercia
e la pietra”, purché dicesse il vero. Per te, invece, fa differenza chi è che parla e da qual
paese viene: tu non ti accontenti di esaminare semplicemente se ciò che dice è vero o
falso.
Fedro – Fai bene a darmi addosso anch’io son del parere che riguardo l’alfabeto le cose
stiano come dice il Tebano.
Socrate – Dunque chi crede di poter tramandare un’arte affidandola all’alfabeto e chi a sua
volta l’accoglie supponendo che dallo scritto si possa trarre qualcosa di preciso e di
permanente, deve esser pieno d’una grande ingenuità, e deve ignorare assolutamente la
profezia di Ammone se s’immagina che le parole scritte siano qualcosa di piú del
rinfrescare la memoria a chi sa le cose di cui tratta lo scritto.
Fedro – È giustissimo.
Socrate – Perché vedi, o Fedro, la scrittura è in una strana condizione, simile veramente a
quella della pittura. I prodotti cioè della pittura ci stanno davanti come se vivessero; ma se
li interroghi, tengono un maestoso silenzio. Nello stesso modo si comportano le parole
scritte: crederesti che potessero parlare quasi che avessero in mente qualcosa; ma se tu,
volendo imparare, chiedi loro qualcosa di ciò che dicono esse ti manifestano una cosa
sola e sempre la stessa. E una volta che sia messo in iscritto, ogni discorso arriva alle
mani di tutti, tanto di chi l’intende tanto di chi non ci ha nulla [e] a che fare; né sa a chi gli
convenga parlare e a chi no. Prevaricato ed offeso oltre ragione esso ha sempre bisogno
che il padre gli venga in aiuto, perché esso da solo non può difendersi né aiutarsi.
Fedro – Ancora hai perfettamente ragione.
Socrate – E che? Vogliamo noi considerare un’altra specie di discorso, fratello di questo
scritto, ma legittimo, e vedere in che modo nasce e di quanto è migliore e piú efficace
dell’altro?
Fedro – Che discorso intendi e qual è la sua origine?
Socrate – Il discorso che è scritto con la scienza nell’anima di chi impara: questo può
difendere se stesso, e sa a chi gli convenga parlare e a chi tacere`


// -------- PAROLE --------

let words = originalText.split(/\s+/)
let totalWords = words.length


// -------- STATO SALVATO --------

let saved = localStorage.getItem("erasedWords")
let erasedSet

if(saved){
erasedSet = new Set(JSON.parse(saved))
}else{
erasedSet = new Set()
}


// -------- CONTATORE VISITE --------

let visits = parseInt(localStorage.getItem("visits")) || 0
visits++

if(visits > 100) visits = 100

localStorage.setItem("visits", visits)


// -------- QUANTE PAROLE DEVONO ESSERE CANCELLATE --------

let percent = visits / 100
let target = Math.floor(totalWords * percent)


// -------- AGGIUNGERE NUOVE PAROLE CANCELLATE --------

while(erasedSet.size < target){

let index = Math.floor(Math.random() * totalWords)
erasedSet.add(index)

}


// -------- SALVARE STATO --------

localStorage.setItem("erasedWords", JSON.stringify([...erasedSet]))


// -------- COSTRUIRE TESTO --------

let output = words.map((word,i)=>{

if(erasedSet.has(i)){

return " ".repeat(word.length)

}else{

return word

}

}).join(" ")


// -------- MOSTRARE --------

document.getElementById("text").innerText = output

</script>

</body>
</html>
